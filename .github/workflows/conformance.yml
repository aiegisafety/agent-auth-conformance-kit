name: conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install pytest
      - name: Run conformance tests (incl. negative control)
        run: pytest -q
      - name: Generate L2 report
        run: python examples/run_reference.py
      - name: Upload L2 report
        uses: actions/upload-artifact@v4
        with:
          name: l2-report-py${{ matrix.python-version }}
          path: reports/
